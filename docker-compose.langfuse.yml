version: '3.8'

# Langfuse self-hosted usando o PostgreSQL existente do projeto.
#
# Antes de subir, crie o banco no seu Postgres:
#   psql -U gustavokkars -c "CREATE DATABASE langfuse;"
#
# No Dokploy: criar novo serviço "Docker Compose" apontando para este arquivo.
# Domínio: langfuse.gustavokarsten.com → porta interna 3000

services:
  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse-server
    restart: unless-stopped
    ports:
      - '3010:3000'
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL}
      NEXTAUTH_URL: ${LANGFUSE_URL}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: 'false'
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: 'false'
