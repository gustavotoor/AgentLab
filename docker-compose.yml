version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentlab-db
    environment:
      POSTGRES_USER: agentlab
      POSTGRES_PASSWORD: agentlab_secret
      POSTGRES_DB: agentlab
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agentlab']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentlab-backend
    ports:
      - '8000:8000'
    environment:
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      FRONTEND_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentlab-app
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://agentlab:agentlab_secret@postgres:5432/agentlab
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-AgentLab <noreply@agentlab.app>}
      BACKEND_INTERNAL_URL: http://backend:8000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      NEXT_PUBLIC_LANGFUSE_DASHBOARD_URL: ${NEXT_PUBLIC_LANGFUSE_DASHBOARD_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
