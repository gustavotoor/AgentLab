services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentlab
      POSTGRES_PASSWORD: agentlab_secret
      POSTGRES_DB: agentlab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://agentlab:agentlab_secret@postgres:5432/agentlab"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "change-me-in-production-use-openssl-rand-base64-32"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_NAME: "AgentLab"

volumes:
  postgres_data:
